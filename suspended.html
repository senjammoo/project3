<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE FEED — Session Interrupted</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C8281E;--blue:#3060D0}
html,body{height:100%}
body{
  background:#080706;color:#DDD5C8;
  font-family:'Syne',sans-serif;
  max-width:390px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2.5rem 1.5rem;text-align:center;
  overflow:hidden;position:relative;
}
#signal-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(4,3,2,0.85) 100%);pointer-events:none;z-index:2}

.c{position:relative;z-index:10;width:100%;animation:cfade 0.8s ease both}
@keyframes cfade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.icon{font-size:2.5rem;margin-bottom:1.6rem;animation:blink 2.2s step-end infinite;display:block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.08}}

.title{font-size:1.25rem;font-weight:800;letter-spacing:-0.04em;line-height:1.2;margin-bottom:0.9rem;position:relative;color:#DDD5C8}
.title::before{content:attr(data-t);position:absolute;left:2px;top:0;color:var(--red);opacity:0;clip-path:inset(20% 0 60% 0);animation:g1 3.8s infinite}
.title::after{content:attr(data-t);position:absolute;left:-2px;top:0;color:var(--blue);opacity:0;clip-path:inset(60% 0 20% 0);animation:g2 4.5s infinite}
@keyframes g1{0%,88%,100%{opacity:0;transform:translateX(0)}90%{opacity:0.8;transform:translate(-3px,0)}92%{opacity:0;transform:translate(2px,0)}}
@keyframes g2{0%,85%,100%{opacity:0;transform:translateX(0)}87%{opacity:0.7;transform:translate(3px,0)}89%{opacity:0}}

.sub{font-family:'Courier Prime',monospace;font-size:0.67rem;color:#524E4A;line-height:1.7;margin-bottom:2.5rem}

.status-row{display:flex;align-items:center;justify-content:center;gap:0.5rem;font-family:'Courier Prime',monospace;font-size:0.55rem;color:#252220;margin-bottom:2rem;letter-spacing:0.06em}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:bdot 1.4s step-end infinite}
@keyframes bdot{0%,100%{opacity:1}50%{opacity:0.1}}

.rbtn{width:100%;padding:0.88rem;background:#141210;color:#DDD5C8;border:1px solid #282420;font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transform:translateX(3px);transition:background 0.2s,border-color 0.2s,transform 0.2s;margin-bottom:0.75rem;text-decoration:none;display:block}
.rbtn:hover{background:#1E1C19;border-color:#383430;transform:translateX(0)}

.end-link{font-family:'Courier Prime',monospace;font-size:0.62rem;color:#242220;text-decoration:none;transition:color 0.2s;display:block;letter-spacing:0.02em}
.end-link:hover{color:var(--red)}
</style>
</head>
<body>

<canvas id="signal-canvas"></canvas>

<div class="c">
  <span class="icon">⛔</span>
  <div class="title" data-t="Your session has been interrupted.">Your session has been interrupted.</div>
  <div class="sub">The account you were viewing has been suspended. This content is no longer available.</div>

  <div class="status-row">
    <div class="s-dot"></div>
    <span>SESSION MONITORING ACTIVE</span>
  </div>

  <a class="rbtn" href="feed.html">← Return to Feed</a>
  <a class="end-link" href="banned.html">claim account →</a>
</div>

<script>
new p5(function(s){
  var W,H,glitchLines=[],timer=0;
  s.setup=function(){
    var cnv=s.createCanvas(window.innerWidth,window.innerHeight);
    cnv.parent('signal-canvas');W=s.width;H=s.height;
    s.colorMode(s.RGB,255,255,255,255);
  };
  s.windowResized=function(){s.resizeCanvas(window.innerWidth,window.innerHeight);W=s.width;H=s.height};
  s.draw=function(){
    s.background(8,7,6,255);
    for(var i=0;i<H;i+=4){var n=s.noise(i*0.02,s.frameCount*0.008)*255;s.stroke(n*0.08,n*0.07,n*0.06,8);s.strokeWeight(1);s.line(0,i,W,i)}
    s.noStroke();s.fill(200,190,180,6);var sx=(s.frameCount*1.8)%W;s.rect(sx,0,1,H);
    timer++;
    if(timer>s.random(90,240)){
      var count=s.floor(s.random(2,8));
      for(var j=0;j<count;j++) glitchLines.push({y:s.random(H),w:s.random(20,W*0.6),x:s.random(W*0.4),life:s.floor(s.random(4,14)),color:[s.random(150,220),s.random(30,80),s.random(20,60)]});
      timer=0;
    }
    for(var k=glitchLines.length-1;k>=0;k--){
      var gl=glitchLines[k];s.noStroke();s.fill(gl.color[0],gl.color[1],gl.color[2],35);s.rect(gl.x,gl.y,gl.w,s.random(1,3));gl.life--;
      if(gl.life<=0) glitchLines.splice(k,1);
    }
  };
});
</script>
</body>
</html>
